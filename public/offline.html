<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — TEAL Enterprise</title>
    <style>
      :root { --teal: #0f766e; --ink: #0b1120; --muted: #64748b; --bg: #f8fafc; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
        background: var(--bg); color: var(--ink);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .card { max-width: 360px; text-align: center; }
      .mark {
        width: 44px; height: 44px; border-radius: 12px; background: var(--teal); color: #fff;
        display: inline-grid; place-items: center; font-weight: 700; font-size: 22px; margin-bottom: 18px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { color: var(--muted); line-height: 1.55; margin: 0 0 20px; }
      button {
        font: inherit; font-weight: 600; color: #fff; background: var(--teal); border: none;
        padding: 10px 18px; border-radius: 9px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">T</div>
      <h1>You're offline</h1>
      <p>TEAL Enterprise needs an internet connection to load your companies and data. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
