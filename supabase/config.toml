# TEAL Enterprise — Supabase local development configuration.
# project_id is the local stack identifier; the hosted project ref is supplied via env/CLI link.
project_id = "teal-enterprise"

[api]
enabled = true
port = 54321
# Expose both module schemas to PostgREST, plus storage/graphql defaults.
schemas = ["public", "core", "accounting"]
extra_search_path = ["public", "core", "accounting"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"
