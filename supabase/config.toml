# TEAL Enterprise — Supabase local development configuration.
# project_id is the local stack identifier; the hosted project ref is supplied via env/CLI link.
project_id = "teal-enterprise"

[api]
enabled = true
port = 54321
# Expose the platform + module schemas to PostgREST (the app queries them with RLS).
schemas = ["public", "graphql_public", "core", "accounting", "cargo"]
extra_search_path = ["public", "core", "accounting", "cargo"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
# Public self-signup is OFF: users are provisioned via invite / the service-role admin
# flow. (Set the same toggle in the hosted dashboard: Authentication → Sign In / Providers.)
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"
