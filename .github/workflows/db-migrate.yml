name: Deploy DB migrations

# Applies any NEW migrations + seed to the Supabase project when they change on main.
# The runner records applied versions in supabase_migrations.schema_migrations, so it
# is idempotent (already-applied migrations are skipped). Targets the single project
# directly — NO Supabase preview branches are created, to avoid branch compute costs.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed/**'
      - 'supabase/tests/**'
      - 'scripts/db-migrate.mjs'
      - 'scripts/db-test.mjs'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply migrations + seed
        run: node scripts/db-migrate.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Post-migration safety check: verify customer-portal isolation against the
      # freshly-migrated DB. Runs in a transaction and ROLLS BACK (no persistent
      # data). Fails the deploy if a portal user could read another customer's data,
      # an internal document, or any base freight table.
      - name: Verify portal isolation (rolled back)
        run: node scripts/db-test.mjs supabase/tests/portal_isolation_test.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Verify stage automation + notifications (rolled back)
        run: node scripts/db-test.mjs supabase/tests/stage_automation_test.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
